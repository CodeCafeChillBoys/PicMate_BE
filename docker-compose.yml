version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: picmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: picmate_db_dev
    ports:
      - '5432:5432'
    volumes:
      - picmate_pg_data:/var/lib/postgresql/data

volumes:
  picmate_pg_data:
